services:
  dnstap-ingester:
    build: ./services/dnstap-ingester
    restart: unless-stopped
    volumes:
      - dnstap-sock:/var/run/dnstap
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: dnsmonitor
      DNSTAP_SOCKET: /var/run/dnstap/dnstap.sock
      BATCH_SIZE: "500"
      FLUSH_INTERVAL: "1s"
    depends_on:
      clickhouse:
        condition: service_healthy

  kresd:
    image: cznic/knot-resolver:latest
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "853:853/tcp"
      - "8853:443/tcp"
    volumes:
      - ./config/kresd/config.yaml:/etc/knot-resolver/config.yaml:ro
      - ./config/kresd/tls:/etc/knot-resolver/tls:ro
      - kresd-cache:/var/cache/knot-resolver
      - dnstap-sock:/var/run/dnstap
    depends_on:
      - dnstap-ingester

  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle

  node-exporter:
    image: prom/node-exporter:v1.9.0
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.d/default-open.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: dnsmonitor
      POSTGRES_USER: dnsmon
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    volumes:
      - pg-data:/var/lib/postgresql/data
    secrets:
      - pg_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnsmon -d dnsmonitor"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./services/backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_PORT: "8080"
      PROMETHEUS_URL: http://prometheus:9090
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: dnsmonitor
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgres://dnsmon:${PG_PASSWORD}@postgres:5432/dnsmonitor?sslmode=disable
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      KRESD_METRICS_URL: http://kresd:5000/metrics
    secrets:
      - jwt_secret
    depends_on:
      kresd:
        condition: service_started
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build: ./services/frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend

volumes:
  kresd-cache:
  dnstap-sock:
  prometheus-data:
  clickhouse-data:
  redis-data:
  pg-data:
  caddy-data:
  caddy-config:

secrets:
  pg_password:
    file: ./secrets/pg_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

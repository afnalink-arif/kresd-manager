-- Knot Resolver configuration (Lua)
-- Production-grade DNS resolver

-- Network interfaces
net.listen('0.0.0.0', 53, { kind = 'dns' })
net.listen('0.0.0.0', 853, { kind = 'tls' })
net.listen('0.0.0.0', 443, { kind = 'doh2' })
net.listen('::',      53,  { kind = 'dns' })
net.listen('::',      853, { kind = 'tls' })
net.listen('::',      443, { kind = 'doh2' })

-- TLS certificates
net.tls('/etc/knot-resolver/tls/server.crt', '/etc/knot-resolver/tls/server.key')

-- Cache configuration (2 GB)
cache.size = 2 * GB

-- Modules
modules.load('hints > iterate')
modules.load('serve_stale < cache')
modules.load('workarounds < iterate')
modules.load('stats')
modules.load('predict')
modules.load('http')

-- Prefetch expiring records
predict.config({ window = 15, period = 24 })

-- DNSSEC validation is enabled by default

-- Serve stale records when upstream is down
serve_stale.timeout = 3 * sec

-- Access control - allow private networks
view:addr('127.0.0.0/8', policy.all(policy.PASS))
view:addr('10.0.0.0/8', policy.all(policy.PASS))
view:addr('172.16.0.0/12', policy.all(policy.PASS))
view:addr('192.168.0.0/16', policy.all(policy.PASS))
view:addr('::1/128', policy.all(policy.PASS))
view:addr('fc00::/7', policy.all(policy.PASS))

-- HTTP module for stats/metrics endpoint on port 8453
http.config({ host = '0.0.0.0', port = 8453, cert = false })

-- Prometheus metrics endpoint at http://kresd:8453/metrics
http.prometheus.namespace = 'kresd'

-- Logging
log_level('notice')

-- Verbose log for debugging (uncomment if needed)
-- log_level('debug')
